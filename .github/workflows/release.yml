name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --verbose

      - name: Run unit tests
        run: cargo test --workspace --all-targets --verbose

  build:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p pcb-toolkit-cli

      - name: Create archive (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../pcb-toolkit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz pcb-toolkit
          cd ../../..

      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../pcb-toolkit-${{ github.ref_name }}-${{ matrix.target }}.zip pcb-toolkit.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcb-toolkit-${{ matrix.target }}
          path: pcb-toolkit-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          # Version is in workspace root Cargo.toml
          EXPECTED_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"

          publish_and_wait() {
            local crate="$1"

            echo "Publishing ${crate} ${EXPECTED_VERSION}"
            cargo publish -p "${crate}" --token "${CARGO_REGISTRY_TOKEN}"

            for i in {1..120}; do
              if cargo search "${crate}" --limit 1 | grep -q "${crate} = \"${EXPECTED_VERSION}\""; then
                echo "${crate} ${EXPECTED_VERSION} found on crates.io after ${i} attempts"
                return 0
              fi
              echo "Waiting for ${crate} ${EXPECTED_VERSION} propagation (attempt ${i}/120)..."
              sleep 5
            done

            echo "ERROR: ${crate} ${EXPECTED_VERSION} not found on crates.io after 10 minutes"
            exit 1
          }

          publish_and_wait pcb-toolkit
          publish_and_wait pcb-toolkit-cli
